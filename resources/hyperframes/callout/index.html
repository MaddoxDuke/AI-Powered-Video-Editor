<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Callout</title>
  <script src="../gsap.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #callout {
      background: rgba(0, 0, 0, 0.85);
      border: 2px solid #f97316;
      border-radius: 12px;
      padding: 28px 40px;
      text-align: center;
      max-width: 800px;
      opacity: 0;
      transform: scale(0.85);
    }
    #text {
      font-size: 40px;
      font-weight: 700;
      color: #ffffff;
      line-height: 1.15;
      letter-spacing: -0.5px;
    }
    #subtext {
      font-size: 26px;
      color: #d4d4d8;
      margin-top: 10px;
      line-height: 1.3;
    }
  </style>
</head>
<body>
  <div id="callout">
    <div id="text"></div>
    <div id="subtext"></div>
  </div>

  <script>
    (function () {
      const vars = window.__hyperframes?.getVariables?.() ?? {};
      const text = vars.text || 'Part / Tool';
      const subtext = vars.subtext || '';
      const duration = parseFloat(vars.duration) || 4;

      document.getElementById('text').textContent = text;
      const subEl = document.getElementById('subtext');
      if (subtext) {
        subEl.textContent = subtext;
      } else {
        subEl.style.display = 'none';
      }

      const el = document.getElementById('callout');
      const tl = gsap.timeline();

      // Scale + fade in
      tl.to(el, {
        opacity: 1,
        scale: 1,
        duration: 0.4,
        ease: 'back.out(1.4)'
      });

      // Hold
      const holdDuration = Math.max(0, duration - 0.4 - 0.3);
      tl.to({}, { duration: holdDuration });

      // Scale up slightly + fade out
      tl.to(el, {
        opacity: 0,
        scale: 1.05,
        duration: 0.3,
        ease: 'power2.in'
      });

      window.__timelines = window.__timelines || {};
      window.__timelines['main'] = tl;
    })();
  </script>
</body>
</html>
